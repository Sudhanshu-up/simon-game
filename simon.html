    <title>simon Gmae</title>
</head>
<body>
    <h1>Simon Says Game</h1>
    <h2>Press any key to start</h2>
    <div class="cantainer">
        
        <div class="lin1">
            <div class="btn1 d yellow" type="button" id="yellow">1</div>
            <div class="btn2 d pink" type="button" id="pink">2</div>
        </div>
        <div class="line2">
            <div class="btn3 d green" type="button" id="green">3</div>
            <div class="btn4 d purple" type="button" id="purple">4</div>
        </div>
         
    </div>


    <script src="simon.js"></script>
</body>
